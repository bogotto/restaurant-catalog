<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ dish.name }}</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 700px; margin: 0 auto; padding: 20px; }
        .back { color: #1a5276; }
        .price { font-size: 22px; font-weight: bold; color: #196f3d; }
    </style>
</head>
<body>
    <p><a class="back" href="{% url 'dish_list' %}">← Назад в каталог</a></p>
    <h1>{{ dish.name }}</h1>
    <p class="cat">Категория: {{ dish.category.name }}</p>
    <p>{{ dish.description }}</p>
    <p>Вес: {{ dish.weight }} г</p>
    <p class="price">{{ dish.price }} ₽</p>
</body>
</html>
